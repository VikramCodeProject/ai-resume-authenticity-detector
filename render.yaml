services:
  # IMPORTANT: Create PostgreSQL database manually in Render Dashboard
  # 1. Go to Render Dashboard → New → PostgreSQL
  # 2. Create: resume-verify-db (free tier)
  # 3. Copy internal database URL
  # 4. Paste into Backend service DATABASE_URL environment variable

  # Backend Service (FastAPI)
  - type: web
    name: resume-verify-backend
    env: python
    plan: free
    region: oregon
    buildCommand: (pip install -r backend/requirements.render.txt) || (python -m pip install -r backend/requirements.render.txt) || (python3 -m pip install -r backend/requirements.render.txt)
    startCommand: cd backend && ((gunicorn main_render:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --access-logfile -) || (python -m gunicorn main_render:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --access-logfile -) || (python3 -m gunicorn main_render:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --access-logfile -))
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      # Environment
      - key: ENVIRONMENT
        value: production
      - key: BACKEND_MODE
        value: full

      # Database Connection (set manually after creating PostgreSQL service)
      - key: DATABASE_URL
        sync: false  # Paste your PostgreSQL internal URL here

      # Database credentials (for reference only)
      - key: POSTGRES_DB
        value: resume_verify

      # Redis Connection (use external service - Upstash)
      - key: REDIS_URL
        sync: false

      # Frontend URL
      - key: FRONTEND_URL
        value: https://resume-verify-frontend.onrender.com

      # Secrets (set in Render dashboard)
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GITHUB_API_KEY
        sync: false
      - key: LINKEDIN_API_KEY
        sync: false
      - key: AWS_S3_BUCKET
        value: resume-verify-prod
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: ETH_RPC_URL
        value: https://polygon-rpc.com
      - key: SMART_CONTRACT_ADDRESS
        sync: false
      - key: PRIVATE_KEY
        sync: false

      # Port
      - key: PORT
        value: "8000"

  # Frontend Service (React + Vite)
  - type: web
    name: resume-verify-frontend
    env: node
    plan: free
    region: oregon
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && npm run preview -- --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /
    envVars:
      # Backend API URL (hardcoded to backend service domain)
      - key: VITE_API_URL
        value: https://resume-verify-backend.onrender.com

      # Environment
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
